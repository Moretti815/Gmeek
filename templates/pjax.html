<!-- PJAX - Partial Page Load System -->
<script>
(function() {
    'use strict';
    
    // PJAX Configuration
    const PJAX_CONFIG = {
        selector: 'a[href^="{{ blogBase["homeUrl"] }}"]:not([data-pjax-disable]):not([href*=".pdf"]):not([href*=".zip"]):not([href*=".rar"]):not([target="_blank"])',
        container: '#content',
        timeout: 10000,
        cache: true,
        cacheLimit: 10
    };
    
    // Cache storage
    const pageCache = new Map();
    
    // Current state
    let isLoading = false;
    let currentUrl = location.href;
    
    // Utility: Parse HTML string
    function parseHTML(html) {
        const parser = new DOMParser();
        return parser.parseFromString(html, 'text/html');
    }
    
    // Utility: Execute scripts in container
    function executeScripts(container) {
        const scripts = container.querySelectorAll('script');
        scripts.forEach(oldScript => {
            const newScript = document.createElement('script');
            // Copy attributes
            Array.from(oldScript.attributes).forEach(attr => {
                newScript.setAttribute(attr.name, attr.value);
            });
            // Copy content
            newScript.textContent = oldScript.textContent;
            // Replace
            oldScript.parentNode.replaceChild(newScript, oldScript);
        });
    }
    
    // Utility: Update elements that need refresh
    function updatePage(doc, url) {
        const newContent = doc.querySelector(PJAX_CONFIG.container);
        const currentContent = document.querySelector(PJAX_CONFIG.container);
        
        if (!newContent || !currentContent) {
            console.warn('PJAX: Content container not found');
            return false;
        }
        
        // Update content
        currentContent.innerHTML = newContent.innerHTML;
        
        // Execute scripts in new content
        executeScripts(currentContent);
        
        // Update title
        const newTitle = doc.querySelector('title');
        if (newTitle) {
            document.title = newTitle.textContent;
        }
        
        // Update meta tags (description, og:*, etc.)
        const metaSelectors = ['meta[name="description"]', 'meta[property^="og:"]', 'meta[name="twitter:"]'];
        metaSelectors.forEach(selector => {
            const newMeta = doc.querySelector(selector);
            const currentMeta = document.querySelector(selector);
            if (newMeta && currentMeta) {
                currentMeta.content = newMeta.content;
            }
        });
        
        // Update header if it exists in both pages
        const newHeader = doc.querySelector('#header');
        const currentHeader = document.querySelector('#header');
        if (newHeader && currentHeader) {
            currentHeader.innerHTML = newHeader.innerHTML;
            executeScripts(currentHeader);
        }
        
        // Update footer if it exists in both pages
        const newFooter = doc.querySelector('#footer');
        const currentFooter = document.querySelector('#footer');
        if (newFooter && currentFooter) {
            currentFooter.innerHTML = newFooter.innerHTML;
            executeScripts(currentFooter);
        }
        
        // Update body classes and attributes
        const newBody = doc.body;
        const currentBody = document.body;
        
        // Copy data attributes from new body
        Array.from(newBody.attributes).forEach(attr => {
            if (attr.name.startsWith('data-')) {
                currentBody.setAttribute(attr.name, attr.value);
            }
        });
        
        // Trigger custom event for page-specific initialization
        window.dispatchEvent(new CustomEvent('pjax:complete', { detail: { url: url } }));
        
        return true;
    }
    
    // Load page via AJAX
    async function loadPage(url, pushState = true) {
        if (isLoading || url === currentUrl) return;
        
        isLoading = true;
        
        // Show loading indicator
        showLoading();
        
        // Check cache
        if (PJAX_CONFIG.cache && pageCache.has(url)) {
            const cached = pageCache.get(url);
            if (Date.now() - cached.time < 5 * 60 * 1000) { // 5 minutes cache
                updatePage(cached.doc, url);
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                currentUrl = url;
                isLoading = false;
                hideLoading();
                return;
            }
            pageCache.delete(url);
        }
        
        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-PJAX': 'true'
                },
                credentials: 'same-origin'
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const html = await response.text();
            const doc = parseHTML(html);
            
            // Cache the page
            if (PJAX_CONFIG.cache) {
                if (pageCache.size >= PJAX_CONFIG.cacheLimit) {
                    const firstKey = pageCache.keys().next().value;
                    pageCache.delete(firstKey);
                }
                pageCache.set(url, { doc: doc, time: Date.now() });
            }
            
            // Update page
            if (updatePage(doc, url)) {
                if (pushState) {
                    history.pushState({ url: url }, '', url);
                }
                currentUrl = url;
                
                // Scroll to top
                window.scrollTo(0, 0);
            } else {
                // Fallback to normal navigation
                location.href = url;
            }
            
        } catch (error) {
            console.error('PJAX load error:', error);
            // Fallback to normal navigation
            location.href = url;
        } finally {
            isLoading = false;
            hideLoading();
        }
    }
    
    // Show loading indicator
    function showLoading() {
        // Use existing preloader if available
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.style.display = 'flex';
            preloader.classList.remove('hidden');
        }
    }
    
    // Hide loading indicator
    function hideLoading() {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => {
                if (!isLoading) {
                    preloader.style.display = 'none';
                }
            }, 500);
        }
    }
    
    // Handle link clicks
    function handleClick(event) {
        const link = event.target.closest('a');
        if (!link) return;
        
        // Check if link matches PJAX selector
        if (!link.matches(PJAX_CONFIG.selector)) return;
        
        // Skip if modifier keys are pressed
        if (event.ctrlKey || event.metaKey || event.shiftKey || event.altKey) return;
        
        // Skip if it's the same page
        if (link.href === currentUrl) {
            event.preventDefault();
            return;
        }
        
        event.preventDefault();
        loadPage(link.href);
    }
    
    // Handle popstate (back/forward buttons)
    function handlePopState(event) {
        if (event.state && event.state.url) {
            loadPage(event.state.url, false);
        }
    }
    
    // Initialize PJAX
    function init() {
        // Don't initialize if browser doesn't support required features
        if (!window.history || !window.history.pushState) return;
        
        // Add click listener to document
        document.addEventListener('click', handleClick);
        
        // Handle back/forward buttons
        window.addEventListener('popstate', handlePopState);
        
        // Save initial state
        history.replaceState({ url: location.href }, '', location.href);
        
        console.log('%c PJAX initialized ', 'padding:2px 5px;background:#0969da;color:#fff;border-radius:3px');
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    // Expose PJAX API
    window.PJAX = {
        load: loadPage,
        reload: function() { loadPage(currentUrl, false); },
        clearCache: function() { pageCache.clear(); },
        config: PJAX_CONFIG
    };
})();
</script>

<!-- PJAX Page Initialization Handler -->
<script>
// Handle page-specific initialization after PJAX load
window.addEventListener('pjax:complete', function(event) {
    const url = event.detail.url;
    
    // Re-initialize theme switcher icon
    const themeSwitch = document.getElementById('themeSwitch');
    if (themeSwitch && typeof IconList !== 'undefined') {
        const currentMode = document.documentElement.getAttribute('data-color-mode');
        if (currentMode === 'dark') {
            themeSwitch.setAttribute('d', IconList['moon']);
            themeSwitch.parentNode.style.color = '#00f0ff';
        } else {
            themeSwitch.setAttribute('d', IconList['sun']);
            themeSwitch.parentNode.style.color = '#ff5000';
        }
    }
    
    // Re-initialize home icon
    const pathHome = document.getElementById('pathHome');
    if (pathHome && typeof IconList !== 'undefined') {
        pathHome.setAttribute('d', IconList['home']);
    }
    
    // Re-initialize memos timeline if on home page
    if (typeof loadMemosTimeline === 'function') {
        const timeline = document.getElementById('memos-timeline');
        if (timeline) {
            // Clear existing interval
            if (window.memosCarouselInterval) {
                clearInterval(window.memosCarouselInterval);
                window.memosCarouselInterval = null;
            }
            // Reset state
            window.currentMemoIndex = 0;
            window.publicMemos = [];
            // Reload timeline
            loadMemosTimeline();
        }
    }
    
    // Re-initialize Vercount stats
    if (typeof createVercount === 'function') {
        createVercount();
    }
    
    // Re-initialize back to top button
    const backToTopBtn = document.getElementById('back-to-top');
    if (backToTopBtn) {
        backToTopBtn.style.display = 'none';
        backToTopBtn.classList.remove('show');
    }
    
    // Re-initialize scroll event listeners
    if (typeof window.throttledHandleScroll === 'function') {
        window.removeEventListener('scroll', window.throttledHandleScroll);
        window.addEventListener('scroll', window.throttledHandleScroll);
        // Reset scroll state
        window.handleScroll();
    }
    
    // Re-run all DOMContentLoaded handlers
    document.dispatchEvent(new Event('DOMContentLoaded'));
    
    console.log('PJAX: Page initialized for', url);
});
</script>

<style>
/* PJAX Loading Indicator */
.pjax-loading-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--color-accent-emphasis, #0969da), var(--color-accent-muted, #54aeff));
    z-index: 10001;
    transition: width 0.3s ease, opacity 0.3s ease;
    width: 0;
    opacity: 0;
}

.pjax-loading-bar.active {
    width: 70%;
    opacity: 1;
    animation: pjax-loading-pulse 1s ease-in-out infinite;
}

.pjax-loading-bar.complete {
    width: 100%;
    opacity: 0;
    transition: width 0.2s ease, opacity 0.2s ease 0.2s;
}

@keyframes pjax-loading-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

/* PJAX Fade Animation */
#content {
    transition: opacity 0.15s ease;
}

#content.pjax-loading {
    opacity: 0.7;
}
</style>
